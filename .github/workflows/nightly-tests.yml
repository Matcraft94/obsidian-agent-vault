# =============================================================================
# GitHub Actions: Nightly Tests Workflow
# =============================================================================
# Triggered on: Nightly schedule (3:00 AM UTC)
# Actions: Compares actual vs documented test counts, creates issues/PRs
# =============================================================================

name: Nightly Tests Audit

on:
  schedule:
    # Run nightly at 3:00 AM UTC
    - cron: '0 3 * * *'
  
  workflow_dispatch:
    inputs:
      create_pr:
        description: 'Create PR if discrepancies found'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      create_issue:
        description: 'Create issue if discrepancies found'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  # Job 1: Compare Test Counts
  compare-tests:
    name: Compare Test Counts
    runs-on: ubuntu-latest
    
    outputs:
      backend_tests: ${{ steps.counts.outputs.backend }}
      frontend_tests: ${{ steps.counts.outputs.frontend }}
      e2e_tests: ${{ steps.counts.outputs.e2e }}
      total_tests: ${{ steps.counts.outputs.total }}
      has_discrepancy: ${{ steps.compare.outputs.has_discrepancy }}
      discrepancy_details: ${{ steps.compare.outputs.details }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      
      - name: Run test counter
        id: counts
        run: |
          chmod +x scripts/count-tests.sh
          
          # Run counter and capture output
          output=$(./scripts/count-tests.sh 2>&1 || true)
          echo "$output"
          
          # Extract counts (adjust patterns as needed)
          backend=$(echo "$output" | grep -i "backend" | grep -oE '[0-9]+' | tail -1 || echo "0")
          frontend=$(echo "$output" | grep -i "frontend" | grep -oE '[0-9]+' | tail -1 || echo "0")
          e2e=$(echo "$output" | grep -iE "e2e|playwright" | grep -oE '[0-9]+' | tail -1 || echo "0")
          total=$((backend + frontend + e2e))
          
          # Set outputs
          echo "backend=$backend" >> $GITHUB_OUTPUT
          echo "frontend=$frontend" >> $GITHUB_OUTPUT
          echo "e2e=$e2e" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          
          echo "Detected counts:"
          echo "  Backend: $backend"
          echo "  Frontend: $frontend"
          echo "  E2E: $e2e"
          echo "  Total: $total"
      
      - name: Compare with documented counts
        id: compare
        run: |
          has_discrepancy="false"
          details=""
          
          if [[ -f "AGENTS.md" ]]; then
            # Extract documented counts from AGENTS.md
            # Pattern examples: "~1,400 tests" or "548 unit tests"
            
            doc_backend=$(grep -oE "[0-9,]+ backend" AGENTS.md | grep -oE "[0-9,]+" | tr -d ',' | head -1 || echo "0")
            doc_frontend=$(grep -oE "[0-9,]+ frontend" AGENTS.md | grep -oE "[0-9,]+" | tr -d ',' | head -1 || echo "0")
            doc_e2e=$(grep -oE "[0-9,]+ E2E" AGENTS.md | grep -oE "[0-9,]+" | tr -d ',' | head -1 || echo "0")
            doc_total=$(grep -oE "~[0-9,]+ tests" AGENTS.md | grep -oE "[0-9,]+" | tr -d ',' | head -1 || echo "0")
            
            actual_backend="${{ steps.counts.outputs.backend }}"
            actual_frontend="${{ steps.counts.outputs.frontend }}"
            actual_e2e="${{ steps.counts.outputs.e2e }}"
            actual_total="${{ steps.counts.outputs.total }}"
            
            echo "Documented: backend=$doc_backend, frontend=$doc_frontend, e2e=$doc_e2e, total=$doc_total"
            echo "Actual: backend=$actual_backend, frontend=$actual_frontend, e2e=$actual_e2e, total=$actual_total"
            
            # Compare
            if [[ "$doc_backend" != "$actual_backend" && "$doc_backend" != "0" ]]; then
              has_discrepancy="true"
              details="${details}- Backend: documented $doc_backend, actual $actual_backend\\n"
            fi
            
            if [[ "$doc_frontend" != "$actual_frontend" && "$doc_frontend" != "0" ]]; then
              has_discrepancy="true"
              details="${details}- Frontend: documented $doc_frontend, actual $actual_frontend\\n"
            fi
            
            if [[ "$doc_e2e" != "$actual_e2e" && "$doc_e2e" != "0" ]]; then
              has_discrepancy="true"
              details="${details}- E2E: documented $doc_e2e, actual $actual_e2e\\n"
            fi
            
            if [[ "$doc_total" != "$actual_total" && "$doc_total" != "0" ]]; then
              has_discrepancy="true"
              details="${details}- Total: documented $doc_total, actual $actual_total\\n"
            fi
          else
            echo "AGENTS.md not found, skipping comparison"
          fi
          
          echo "has_discrepancy=$has_discrepancy" >> $GITHUB_OUTPUT
          echo "details<<EOF" >> $GITHUB_OUTPUT
          echo -e "$details" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          if [[ "$has_discrepancy" == "true" ]]; then
            echo "Discrepancies found:"
            echo -e "$details"
          else
            echo "No discrepancies found"
          fi

  # Job 2: Create Issue if Discrepancies Found
  create-issue:
    name: Create Issue for Discrepancies
    runs-on: ubuntu-latest
    needs: compare-tests
    if: ${{ needs.compare-tests.outputs.has_discrepancy == 'true' && github.event.inputs.create_issue != 'false' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check for existing issue
        id: check_issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = '📊 Test Count Discrepancy Detected';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'documentation,automated'
            });
            
            const existingIssue = issues.data.find(issue => issue.title === title);
            
            if (existingIssue) {
              console.log(`Found existing issue #${existingIssue.number}`);
              core.setOutput('issue_number', existingIssue.number);
              core.setOutput('exists', 'true');
            } else {
              console.log('No existing issue found');
              core.setOutput('exists', 'false');
            }
      
      - name: Create or update issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = '📊 Test Count Discrepancy Detected';
            const body = `## Test Count Discrepancy Report
            
            **Run Date:** ${new Date().toISOString()}
            **Workflow:** ${{ github.workflow }}
            **Commit:** ${{ github.sha }}
            
            ### Current Test Counts
            - **Backend:** ${{ needs.compare-tests.outputs.backend_tests }}
            - **Frontend:** ${{ needs.compare-tests.outputs.frontend_tests }}
            - **E2E:** ${{ needs.compare-tests.outputs.e2e_tests }}
            - **Total:** ${{ needs.compare-tests.outputs.total_tests }}
            
            ### Discrepancies
            ${{ needs.compare-tests.outputs.discrepancy_details }}
            
            ### Action Required
            Please run the following command to update AGENTS.md:
            \`\`\`bash
            ./scripts/count-tests.sh --update
            \`\`\`
            
            Or update the counts manually in AGENTS.md.
            
            ---
            *This issue was created automatically by the Nightly Tests Audit workflow.*`;
            
            const labels = ['documentation', 'automated'];
            
            if ('${{ steps.check_issue.outputs.exists }}' === 'true') {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt('${{ steps.check_issue.outputs.issue_number }}'),
                body: body
              });
              console.log(`Updated issue #${{ steps.check_issue.outputs.issue_number }}`);
            } else {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: labels
              });
              console.log(`Created issue #${issue.data.number}`);
            }

  # Job 3: Auto-create PR (optional)
  create-pr:
    name: Auto-update AGENTS.md
    runs-on: ubuntu-latest
    needs: compare-tests
    if: ${{ needs.compare-tests.outputs.has_discrepancy == 'true' && github.event.inputs.create_pr == 'true' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Update test counts
        run: |
          chmod +x scripts/count-tests.sh
          ./scripts/count-tests.sh --update --quiet
      
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi
      
      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automated/test-count-update
          base: main
          title: '📊 Update test counts in AGENTS.md'
          body: |
            ## Automated Test Count Update
            
            This PR updates the test counts in AGENTS.md to match the actual count.
            
            ### Updated Counts
            - **Backend:** ${{ needs.compare-tests.outputs.backend_tests }}
            - **Frontend:** ${{ needs.compare-tests.outputs.frontend_tests }}
            - **E2E:** ${{ needs.compare-tests.outputs.e2e_tests }}
            - **Total:** ${{ needs.compare-tests.outputs.total_tests }}
            
            ---
            *Generated automatically by the Nightly Tests Audit workflow.*
          commit-message: 'docs: update test counts in AGENTS.md'
          labels: documentation, automated
          delete-branch: true

  # Job 4: Summary
  audit-summary:
    name: Audit Summary
    runs-on: ubuntu-latest
    needs: [compare-tests, create-issue, create-pr]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "# Nightly Tests Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Date:** $(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Counts" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ needs.compare-tests.outputs.backend_tests }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.compare-tests.outputs.frontend_tests }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E: ${{ needs.compare-tests.outputs.e2e_tests }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total:** ${{ needs.compare-tests.outputs.total_tests }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.compare-tests.outputs.has_discrepancy }}" == "true" ]]; then
            echo "## ⚠️ Discrepancies Found" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "${{ needs.compare-tests.outputs.discrepancy_details }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Actions taken:" >> $GITHUB_STEP_SUMMARY
            if [[ "${{ needs.create-issue.result }}" == "success" ]]; then
              echo "- ✓ Issue created/updated" >> $GITHUB_STEP_SUMMARY
            fi
            if [[ "${{ needs.create-pr.result }}" == "success" ]]; then
              echo "- ✓ Pull request created" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## ✓ No Discrepancies" >> $GITHUB_STEP_SUMMARY
            echo "All test counts match documented values." >> $GITHUB_STEP_SUMMARY
          fi
