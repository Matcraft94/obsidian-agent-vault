# =============================================================================
# GitHub Actions: Documentation Validation Workflow
# =============================================================================
# Triggered on: Pull requests and nightly schedule
# Validates: Wiki-links, test counts, markdown formatting
# =============================================================================

name: Documentation Validation

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - '**.md'
      - 'scripts/**'
      - '.github/workflows/**'
  
  schedule:
    # Run nightly at 2:00 AM UTC
    - cron: '0 2 * * *'
  
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose output'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  # Job 1: Link Validation
  link-validation:
    name: Validate Wiki-Links
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y fd-find
      
      - name: Run link validator
        id: validate
        run: |
          chmod +x scripts/validate-links.sh
          if [[ "${{ github.event.inputs.verbose }}" == "true" ]]; then
            ./scripts/validate-links.sh
          else
            ./scripts/validate-links.sh --quiet
          fi
        env:
          VAULT_ROOT: .
          SEARCH_DIRS: "MOCs Topics ADRs Daily\\ Notes"
        continue-on-error: true
      
      - name: Upload link report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-validation-report
          path: |
            link-report.txt
            broken-links.txt
        continue-on-error: true
      
      - name: Check validation result
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::error::Wiki-link validation failed!"
          exit 1

  # Job 2: Test Count Verification
  test-count:
    name: Verify Test Counts
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: ['20']
        python-version: ['3.11']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
        continue-on-error: true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
        continue-on-error: true
      
      - name: Run test counter
        id: count
        run: |
          chmod +x scripts/count-tests.sh
          ./scripts/count-tests.sh --quiet
        continue-on-error: true
      
      - name: Report test counts
        run: |
          echo "## Test Count Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ./scripts/count-tests.sh || true
      
      - name: Check for discrepancies
        if: steps.count.outcome == 'failure'
        run: |
          echo "::warning::Test counts don't match documented values"
          echo "Run './scripts/count-tests.sh --update' to fix AGENTS.md"

  # Job 3: Markdown Linting
  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
        continue-on-error: true
      
      - name: Install markdownlint
        run: npm install -g markdownlint-cli2
        continue-on-error: true
      
      - name: Create markdownlint config
        run: |
          cat > .markdownlint.json << 'EOF'
          {
            "default": true,
            "MD013": { "line_length": 120, "code_blocks": false, "tables": false },
            "MD033": { "allowed_elements": ["br", "details", "summary"] },
            "MD041": false,
            "MD025": { "level": 1 },
            "MD024": { "allow_different_nesting": true }
          }
          EOF
      
      - name: Run markdownlint
        run: |
          markdownlint-cli2 "**/*.md" \
            --config .markdownlint.json \
            --ignore "node_modules/**" \
            --ignore ".obsidian/**" \
            --ignore ".git/**"
        continue-on-error: true

  # Job 4: Vault Structure Validation
  vault-structure:
    name: Check Vault Structure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Validate directory structure
        run: |
          errors=0
          
          echo "Checking vault structure..."
          
          # Check required directories
          for dir in "MOCs" "Topics" "ADRs" "Daily Notes"; do
            if [[ -d "$dir" ]]; then
              echo "✓ $dir/ exists"
            else
              echo "✗ $dir/ missing"
              errors=$((errors + 1))
            fi
          done
          
          # Check optional directories
          for dir in "Clippings" "Attachments"; do
            if [[ -d "$dir" ]]; then
              echo "✓ $dir/ exists (optional)"
            else
              echo "○ $dir/ not present (optional)"
            fi
          done
          
          # Check for AGENTS.md
          if [[ -f "AGENTS.md" ]]; then
            echo "✓ AGENTS.md exists"
          else
            echo "⚠ AGENTS.md not found"
          fi
          
          exit $errors
        continue-on-error: true

  # Job 5: Summary
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [link-validation, test-count, markdown-lint, vault-structure]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "# Documentation Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Link Validation | ${{ needs.link-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Count | ${{ needs.test-count.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Markdown Lint | ${{ needs.markdown-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vault Structure | ${{ needs.vault-structure.result }} |" >> $GITHUB_STEP_SUMMARY
