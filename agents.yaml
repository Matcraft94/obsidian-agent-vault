# Agent Configuration for Obsidian Vault Template
# FORCE: Vault interaction is MANDATORY

project:
  name: "PROJECT_NAME"
  type: "PROJECT_TYPE"
  description: "PROJECT_DESCRIPTION"
  
vault:
  path: "VAULT_PATH"
  required: true
  auto_detect: true
  
  # Mandatory files to read on EVERY session
  required_reading:
    - "AGENTS.md"
    - "CLAUDE.md"
    - "README.md"
    - "CHANGELOG.md"
  
  # Skills to use for vault interaction (NEW - Local skills)
  skills:
    primary:
      - "vault-reader"              # Query and read vault efficiently
      - "vault-writer"              # Create/modify documentation
      - "vault-daily"               # Create Daily Notes
      - "vault-commit"              # Commit vault changes
    
    secondary:
      - "obsidian-vault-querier"    # Query and search (fallback)
      - "vault-knowledge"           # Read + Write cycle (fallback)
      - "writing-plans"             # Plan creation
      - "executing-plans"           # Plan execution

# Workflow Enforcement
workflow:
  # BEFORE any work
  pre_work:
    - "Read AGENTS.md from vault"
    - "Check latest Daily Notes"
    - "Search relevant topics"
    - "Review Implementation Progress"
    - "Review lessons learned files"
  
  # DURING work
  during_work:
    - "Document concepts in Topics/"
    - "Link to related concepts via wiki-links"
    - "Update relevant MOCs"
    - "Create Daily Note entries"
    - "Follow Swarm Protocol for documentation tasks"
  
  # BEFORE commit (CRITICAL)
  pre_commit:
    - "Validate wiki-links with ./scripts/validate-links.sh"
    - "Count tests with ./scripts/count-tests.sh"
    - "Update relevant Topics"
    - "Create ADR if architectural decision"
    - "Update Implementation Progress"
    - "Commit vault changes FIRST"
    - "Commit repo changes SECOND"

# Agent Specialization
agents:
  vault_reader:
    role: "Read and query vault for information"
    skill: "vault-reader"
    triggers:
      - "consulta el vault"
      - "busca en el vault"
      - "search vault"
      - "find topic"
      - "query MOC"
      - "what's the status"
      - "latest Daily Note"
    
  vault_writer:
    role: "Write documentation to vault"
    skill: "vault-writer"
    triggers:
      - "document feature"
      - "create topic"
      - "update MOC"
      - "add ADR"
      - "write Daily Note"
    
  vault_daily:
    role: "Create and manage Daily Notes"
    skill: "vault-daily"
    triggers:
      - "create Daily Note"
      - "session log"
      - "daily journal"
      - "log progress"
    
  vault_commit:
    role: "Commit vault changes to git"
    skill: "vault-commit"
    triggers:
      - "commit vault"
      - "save vault changes"
      - "git commit vault"

# Synchronization Rules
sync:
  repo_to_vault:
    - event: "new_feature"
      action: "Create topic in Topics/"
    - event: "architectural_decision"
      action: "Create ADR in ADRs/"
    - event: "bug_fix"
      action: "Daily Note + BUG topic if critical"
    - event: "test_results"
      action: "Update Testing MOC"
    - event: "api_change"
      action: "Update API Documentation MOC"
  
  vault_to_repo:
    - event: "research_topic"
      action: "Add to implementation notes"
    - event: "design_decision"
      action: "Update code comments"
    - event: "test_strategy"
      action: "Update test files"

# Swarm Protocol
swarm:
  enabled: true
  min_agents: 3
  
  compositions:
    feature_documentation:
      agents: ["backend", "frontend", "database", "testing", "vault_keeper"]
      description: "For documenting new features"
    
    verification:
      agents: ["backend", "database", "architecture", "testing", "api_docs"]
      description: "For verifying documentation vs code"
    
    test_counting:
      agents: ["backend", "testing"]
      description: "For counting and verifying tests"
    
    architecture_decision:
      agents: ["backend", "database", "vault_keeper"]
      description: "For architectural decisions"
  
  coordination_protocol:
    - "Launch all agents simultaneously"
    - "Each agent works independently on their domain"
    - "Main agent merges findings into single report"
    - "Cross-check findings between agents"
    - "Update vault based on consolidated report ONLY"
    - "Commit all vault changes together"

# Validation Scripts
scripts:
  validate_links: "./scripts/validate-links.sh"
  count_tests: "./scripts/count-tests.sh"
  quarterly_audit: "./scripts/quarterly-audit.sh"
  check_structure: "./scripts/check-structure.sh"

# Forbidden Actions (UPDATED)
forbidden:
  - "Commit without reading vault"
  - "Create duplicate topics"
  - "Leave topics without wiki-links"
  - "Create subfolders in Topics/"
  - "Skip documentation of decisions"
  - "Forget to link to related notes"
  - "Update vault without using swarm (for complex tasks)"
  - "Mix vault commits with code commits"
  - "Hardcode test counts or metrics"
  - "Create wiki-links to non-existent files"
  - "Mark task complete without verification"
  - "Skip pre-commit validation"

# Documentation Synchronization Rules
doc_sync:
  rules:
    - name: "Zero Documentation Drift"
      description: "Before marking ANY task complete"
      checklist:
        - "Code implemented and tested"
        - "Tests actually exist (verified)"
        - "Wiki-links validated"
        - "Topics created for new functionality"
        - "ADRs updated for architectural decisions"
        - "Test counts verified"
    
    - name: "Verify Before Link"
      description: "Every wiki-link must point to existing file"
    
    - name: "Single Source of Truth"
      description: "Metrics must be generated, not hardcoded"
    
    - name: "Decision → ADR First"
      description: "No architectural decision without prior ADR"
    
    - name: "Mandatory Agent Swarm"
      description: "Min 3 agents for documentation-affecting changes"
    
    - name: "Integration Test Mandatory"
      description: "All new features require integration test"

# CI/CD Integration
ci_cd:
  workflows:
    - name: "docs-validation"
      file: ".github/workflows/docs-validation.yml"
      triggers: ["pull_request", "schedule"]
    
    - name: "nightly-tests"
      file: ".github/workflows/nightly-tests.yml"
      triggers: ["schedule", "workflow_dispatch"]
  
  pre_commit:
    enabled: true
    config: ".pre-commit-config.yaml"
    hooks:
      - "markdownlint"
      - "validate-links"
      - "check-structure"
